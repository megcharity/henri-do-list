<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Henrietta's · Manager App</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('Xv8PW_nj-tZKsC279');</script>
  <style>
    :root {
      --cream:   #efe8df;
      --cream-dk:#e4dbd0;
      --red:     #751919;
      --navy:    #19222e;
      --lavender:#8b95c4;
      --white:   #ffffff;
      --border:  rgba(25,34,46,.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--cream);color:var(--navy);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;z-index:300;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transition:opacity .4s,transform .4s;}
    #login-screen.hidden{opacity:0;pointer-events:none;transform:translateY(-12px);}
    .login-logo{margin-bottom:28px;text-align:center;}
    .login-logo img{height:110px;display:block;margin:0 auto;}
    .login-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:500;color:var(--navy);text-align:center;margin-bottom:6px;}
    .login-sub{font-size:13px;color:rgba(25,34,46,.45);text-align:center;margin-bottom:32px;}
    .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(25,34,46,.2);background:transparent;transition:all .15s;}
    .pin-dot.filled{background:var(--red);border-color:var(--red);}
    .pin-dot.error{border-color:#c0392b;background:#c0392b;}
    .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto 14px;}
    .pin-key{aspect-ratio:1;border:1.5px solid rgba(25,34,46,.15);border-radius:6px;background:var(--cream);font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .pin-key:hover{background:rgba(117,25,25,.06);border-color:var(--red);}
    .pin-key.pin-sm{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:rgba(25,34,46,.4);border-color:transparent;}
    .pin-key.pin-zero{grid-column:2;}
    .pin-error{text-align:center;font-size:12px;color:#c0392b;min-height:18px;font-weight:500;}

    /* PORTAL */
    #portal{opacity:0;pointer-events:none;transition:opacity .5s;}
    #portal.visible{opacity:1;pointer-events:all;}

    /* HEADER */
    header{background:var(--cream);border-bottom:1px solid rgba(25,34,46,.12);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50;}
    .h-logo{display:flex;align-items:center;gap:10px;}
    .h-logo img{height:36px;opacity:.95;}
    .h-logo-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--navy);letter-spacing:.03em;}
    .h-nav{display:flex;gap:4px;}
    .h-tab{padding:5px 13px;border-radius:6px;border:none;background:transparent;font-size:12px;font-weight:600;color:rgba(25,34,46,.4);cursor:pointer;font-family:inherit;transition:all .15s;}
    .h-tab:hover{color:var(--navy);}
    .h-tab.active{background:rgba(117,25,25,.08);color:var(--red);}
    .h-signout{font-size:11px;color:rgba(25,34,46,.35);background:none;border:none;cursor:pointer;font-family:inherit;}
    .h-signout:hover{color:var(--navy);}

    /* TABS */
    .tab-panel{display:none;padding:0 0 80px;}
    .tab-panel.active{display:block;}
    .page-wrap{max-width:860px;margin:0 auto;padding:28px 20px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;color:var(--navy);margin-bottom:4px;}
    .page-sub{font-size:13px;color:rgba(25,34,46,.4);margin-bottom:24px;}

    /* SHIFT REPORT */
    .sr-block{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
    .sr-blk-hdr{padding:11px 18px;}
    .sr-blk-hdr.red{background:var(--red);}
    .sr-blk-hdr.navy{background:var(--navy);}
    .sr-blk-hdr.lav{background:var(--lavender);}
    .sr-blk-title{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;}
    .sr-blk-title.lt{color:rgba(239,232,223,.85);}
    .sr-blk-title.dk{color:var(--navy);}
    .sr-body{padding:14px 18px;}
    .sr-sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(25,34,46,.3);margin:14px 0 7px;padding-top:12px;border-top:1px solid rgba(25,34,46,.06);}
    .sr-sec:first-child{margin-top:0;padding-top:0;border-top:none;}
    .sr-lbl{font-size:11px;font-weight:600;color:rgba(25,34,46,.4);margin-bottom:4px;margin-top:10px;}
    .sr-lbl:first-child{margin-top:0;}
    .sr-inp{width:100%;padding:9px 12px;border:1.5px solid rgba(25,34,46,.13);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);background:var(--cream);outline:none;}
    .sr-inp:focus{border-color:var(--red);}
    .sr-ta{width:100%;padding:9px 12px;border:1.5px solid rgba(25,34,46,.13);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);background:var(--cream);outline:none;resize:vertical;}
    .sr-ta:focus{border-color:var(--red);}
    .sr-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .sr-locked{padding:9px 12px;border:1.5px solid rgba(25,34,46,.07);border-radius:7px;font-size:13px;color:var(--navy);background:rgba(25,34,46,.03);min-height:38px;}
    .sr-select{width:100%;padding:9px 12px;border:1.5px solid rgba(25,34,46,.13);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);background:var(--cream);outline:none;}
    .sr-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;padding:14px 18px;background:var(--cream-dk);}
    .sr-stat-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(25,34,46,.38);margin-bottom:3px;}
    .sr-stat-val{font-size:18px;font-weight:500;color:var(--navy);font-family:'Cormorant Garamond',serif;}
    .sr-submit-bar{position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;}
    .btn-red{padding:10px 26px;background:var(--red);color:#efe8df;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s;}
    .btn-red:hover{opacity:.87;}
    .btn-outline{padding:8px 16px;background:transparent;color:var(--navy);border:1.5px solid rgba(25,34,46,.2);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
    .btn-outline:hover{border-color:var(--navy);}

    /* CHECKLIST */
    .cl-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid rgba(25,34,46,.06);}
    .cl-item:last-child{border-bottom:none;}
    .cl-chk{width:20px;height:20px;border-radius:5px;border:2px solid rgba(25,34,46,.18);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .cl-chk.good{background:var(--red);border-color:var(--red);}
    .cl-chk.good::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
    .cl-chk.needs{background:#e67e22;border-color:#e67e22;}
    .cl-chk.poor{background:#c0392b;border-color:#c0392b;}
    .cl-txt{font-size:13px;color:var(--navy);line-height:1.5;flex:1;}
    .cl-txt.done{text-decoration:line-through;color:rgba(25,34,46,.3);}
    .cl-ratings{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
    .cl-rb{padding:3px 10px;border-radius:20px;border:1.5px solid rgba(25,34,46,.14);font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:rgba(25,34,46,.45);font-family:inherit;transition:all .15s;}
    .cl-rb.sg{background:rgba(78,98,44,.12);border-color:#4e622c;color:#4e622c;}
    .cl-rb.sn{background:rgba(230,126,34,.12);border-color:#e67e22;color:#c87a00;}
    .cl-rb.sp{background:rgba(192,57,43,.1);border-color:#c0392b;color:#c0392b;}
    .cl-issue{width:100%;padding:7px 10px;border:1.5px solid rgba(25,34,46,.11);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--navy);background:var(--cream);outline:none;margin-top:6px;}
    .cl-issue:focus{border-color:var(--red);}
    .cl-fix-row{display:flex;gap:8px;margin-top:5px;}
    .cl-fb{padding:3px 10px;border-radius:20px;border:1.5px solid rgba(25,34,46,.14);font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:rgba(25,34,46,.4);font-family:inherit;}
    .cl-fb.sy{background:rgba(78,98,44,.12);border-color:#4e622c;color:#4e622c;}
    .cl-fb.sno{background:rgba(192,57,43,.1);border-color:#c0392b;color:#c0392b;}
    .cl-progress{height:4px;background:rgba(25,34,46,.08);border-radius:2px;margin-bottom:18px;}
    .cl-progress-fill{height:4px;background:var(--red);border-radius:2px;transition:width .3s;}

    /* PAST */
    .past-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
    .past-card:hover{border-color:var(--red);box-shadow:0 4px 14px rgba(117,25,25,.08);}

    /* TOAST */
    #h-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy);color:#efe8df;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;}
    #h-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    @media(max-width:600px){.sr-row2{grid-template-columns:1fr;}.page-wrap{padding:18px 14px;}.h-nav{display:none;}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">
    <img id="h-logo-img" src="" alt="Henrietta's"/>
  </div>
  <h1 class="login-title">Manager Access</h1>
  <p class="login-sub">Enter your PIN to continue</p>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key pin-sm" onclick="pinClear()">CLEAR</button>
    <button class="pin-key pin-zero" onclick="pinPress('0')">0</button>
    <button class="pin-key pin-sm" onclick="pinDel()">&#9003;</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- PORTAL -->
<div id="portal">
  <header>
    <div class="h-logo">
      <img id="h-logo-header" src="" alt="Henrietta's"/>
      <span class="h-logo-text">Henrietta's</span>
    </div>
    <nav class="h-nav">
      <button class="h-tab active" onclick="showTab('shift',this)">Shift Report</button>
      <button class="h-tab" onclick="showTab('checklist',this)">Closing Checklist</button>
      <button class="h-tab" onclick="showTab('past',this)">Past Reports</button>
    </nav>
    <button class="h-signout" onclick="signOut()">Sign out</button>
  </header>

  <div id="tab-shift" class="tab-panel active">
    <div id="sr-panel"></div>
  </div>

  <div id="tab-checklist" class="tab-panel">
    <div class="page-wrap">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div>
          <h1 class="page-title">Closing Checklist</h1>
          <p class="page-sub" id="cl-date-lbl">Tonight's closing walkthrough</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="cl-save-lbl" style="font-size:11px;color:rgba(25,34,46,.35);"></span>
          <button class="btn-outline" id="cl-signoff-btn" onclick="signOffChecklist()">Sign Off</button>
        </div>
      </div>
      <div class="cl-progress"><div class="cl-progress-fill" id="cl-prog-fill" style="width:0%"></div></div>
      <div id="cl-body"></div>
    </div>
  </div>

  <div id="tab-past" class="tab-panel">
    <div class="page-wrap">
      <h1 class="page-title">Past Shift Reports</h1>
      <p class="page-sub">Select a date to view that night's report</p>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <input type="date" id="past-picker" style="flex:1;padding:10px 12px;border:1.5px solid rgba(25,34,46,.18);border-radius:8px;font-size:14px;font-family:inherit;color:var(--navy);background:var(--white);outline:none;" onchange="pastCheck(this.value)"/>
        <button class="btn-red" onclick="pastGo()">View &#8594;</button>
      </div>
      <div id="past-status" style="font-size:12px;color:rgba(25,34,46,.4);min-height:18px;margin-bottom:14px;"></div>
      <div id="past-body"></div>
    </div>
  </div>
</div>

<div id="h-toast"></div>

// HELPERS
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(s) {
  const d = new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
async function sGet(path) {
  const r = await fetch(SUPA+path,{headers:HDRS});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}
async function sPatch(path,body) {
  return fetch(SUPA+path,{method:'PATCH',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify(body)});
}
async function sPost(path,body) {
  const r = await fetch(SUPA+path,{method:'POST',headers:{...HDRS,'Prefer':'return=representation'},body:JSON.stringify(body)});
  const t = await r.text(); return t?JSON.parse(t):null;
}
function toast(msg) {
  const el = document.getElementById('h-toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// PIN
let pin='';
function pinPress(d){if(pin.length>=4)return;pin+=d;updateDots();if(pin.length===4)setTimeout(checkPin,120);}
function pinDel(){pin=pin.slice(0,-1);updateDots();}
function pinClear(){pin='';updateDots();}
function updateDots(){for(let i=0;i<4;i++){const dot=document.getElementById('dot-'+i);dot.classList.toggle('filled',i<pin.length);dot.classList.remove('error');}}
function checkPin(){
  if(pin===PIN){
    sessionStorage.setItem('h_auth','1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('portal').classList.add('visible');
    initApp();
  } else {
    for(let i=0;i<4;i++){const d=document.getElementById('dot-'+i);d.classList.remove('filled');d.classList.add('error');}
    document.getElementById('pin-error').textContent='Incorrect PIN — try again';
    setTimeout(()=>{pin='';updateDots();document.getElementById('pin-error').textContent='';},1000);
  }
}
function signOut(){sessionStorage.removeItem('h_auth');document.getElementById('portal').classList.remove('visible');document.getElementById('login-screen').classList.remove('hidden');pin='';updateDots();}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('login-screen').classList.contains('hidden')){
    if(e.key>='0'&&e.key<='9')pinPress(e.key);
    else if(e.key==='Backspace')pinDel();
    else if(e.key==='Escape')pinClear();
  }
});

// TABS
function showTab(name,el){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.h-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(el)el.classList.add('active');
  if(name==='shift')renderSR();
  if(name==='checklist')renderCL();
  if(name==='past'){const pp=document.getElementById('past-picker');if(pp&&pp.value)pastCheck(pp.value);}
}

function initApp(){
  renderSR();
  renderCL();
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const ys=yest.getFullYear()+'-'+String(yest.getMonth()+1).padStart(2,'0')+'-'+String(yest.getDate()).padStart(2,'0');
  const pp=document.getElementById('past-picker');
  if(pp){pp.value=ys;pp.max=todayStr();}
}

// SHIFT REPORT
let srData={},srId=null,srSubmitted=false,srTimer=null;
function srGet(k){return srData[k]!==undefined?srData[k]:'';}
function srSet(k,v){srData[k]=v;clearTimeout(srTimer);srTimer=setTimeout(()=>srSave(false),800);}

async function renderSR(){
  const panel=document.getElementById('sr-panel');
  panel.innerHTML='<div style="padding:32px;text-align:center;color:rgba(25,34,46,.4);">Loading...</div>';
  const today=todayStr();
  try{
    const rows=await sGet('/rest/v1/h_shift_reports?date=eq.'+today+'&venue=eq.'+VENUE+'&order=id.desc&limit=1');
    if(Array.isArray(rows)&&rows[0]){srId=rows[0].id;srData=rows[0].data||{};srSubmitted=!!srData.submitted;}
    else{srId=null;srData={};srSubmitted=false;}
  }catch(e){srId=null;srData={};srSubmitted=false;}
  buildSR();
}

function buildSR(){
  const panel=document.getElementById('sr-panel');
  const today=todayStr();
  const locked=srSubmitted;
  const f=(k,ph,type)=>locked?'<div class="sr-locked">'+(srGet(k)||'—')+'</div>'
    :'<input class="sr-inp" type="'+(type||'text')+'" placeholder="'+(ph||'')+'" value="'+String(srGet(k)).replace(/"/g,'&quot;')+'" oninput="srSet(\''+k+'\',this.value)"/>';
  const ta=(k,ph,rows)=>locked?'<div class="sr-locked" style="white-space:pre-wrap;min-height:52px;">'+(srGet(k)||'—')+'</div>'
    :'<textarea class="sr-ta" rows="'+(rows||3)+'" placeholder="'+(ph||'')+'" oninput="srSet(\''+k+'\',this.value)">'+srGet(k)+'</textarea>';
  const lbl=t=>'<div class="sr-lbl">'+t+'</div>';
  const sec=t=>'<div class="sr-sec">'+t+'</div>';
  const r2=(a,b)=>'<div class="sr-row2">'+a+b+'</div>';

  // Events
  const numEv=parseInt(srGet('num_events'))||0;
  let evHtml='';
  if(!locked){
    evHtml+='<div class="sr-lbl" style="margin-top:0;">How many events?&nbsp;';
    evHtml+='<select class="sr-select" style="width:70px;display:inline-block;" onchange="srSet(\'num_events\',this.value);buildSR()">';
    [0,1,2,3].forEach(n=>evHtml+='<option value="'+n+'"'+(numEv===n?' selected':'')+'>'+n+'</option>');
    evHtml+='</select></div>';
  } else if(numEv>0) {
    evHtml+='<div class="sr-lbl" style="margin-top:0;">'+numEv+' event'+(numEv>1?'s':'')+'</div>';
  }
  for(let i=1;i<=numEv;i++){
    evHtml+='<div style="border:1px solid rgba(25,34,46,.1);border-radius:8px;padding:12px;margin-top:10px;background:rgba(117,25,25,.03);">';
    evHtml+='<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Event '+i+'</div>';
    evHtml+=r2('<div>'+lbl('Event Name')+f('ev'+i+'_name','Event name')+'</div>','<div>'+lbl('Rating (1–5)')+f('ev'+i+'_rating','1–5','number')+'</div>');
    evHtml+=lbl('What went well')+ta('ev'+i+'_well','Notes...',2);
    evHtml+=lbl('What could be improved')+ta('ev'+i+'_improve','Notes...',2);
    evHtml+=lbl('Feedback from POC')+ta('ev'+i+'_poc','Notes...',2);
    evHtml+=r2('<div>'+lbl('Follow-up needed?')+f('ev'+i+'_followup_yn','Yes / No')+'</div>','<div>'+lbl('Follow-up notes')+f('ev'+i+'_followup','Notes...')+'</div>');
    evHtml+='</div>';
  }

  panel.innerHTML=
  // Sticky header
  '<div style="padding:14px 18px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:54px;background:var(--cream);z-index:10;border-bottom:1px solid rgba(25,34,46,.08);">'

function srUpdateTotals(){
  const food=parseFloat(srGet('food_sales'))||0;
  const bev=parseFloat(srGet('bev_sales'))||0;
  const total=food+bev;
  const covers=parseFloat(srGet('covers'))||0;
  const ppa=covers?total/covers:0;
  const posC=parseFloat(srGet('pos_comps'))||0;
  const negC=parseFloat(srGet('neg_comps'))||0;

  const totEl=document.getElementById('sr-totals');
  if(totEl&&total){
    totEl.innerHTML='<div style="display:flex;gap:18px;flex-wrap:wrap;">'
      +'<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(25,34,46,.38);">Total</div>'
      +'<div style="font-size:20px;font-weight:500;color:var(--navy);font-family:Cormorant Garamond,serif;">$'+total.toFixed(2)+'</div></div>'
      +(ppa?'<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(25,34,46,.38);">PPA</div>'
      +'<div style="font-size:20px;font-weight:500;color:var(--navy);font-family:Cormorant Garamond,serif;">$'+ppa.toFixed(2)+'</div></div>':'')
      +'</div>';
  }

  const sumEl=document.getElementById('sr-summary');
  if(!sumEl)return;
  const mets=[['Covers',covers||null,v=>v.toFixed(0)],['Food',food||null,v=>'$'+v.toFixed(0)],['Bev',bev||null,v=>'$'+v.toFixed(0)],['Total',total||null,v=>'$'+v.toFixed(0)],['PPA',ppa||null,v=>'$'+v.toFixed(2)],['+Comps',posC||null,v=>'$'+v.toFixed(0)],['-Comps',negC||null,v=>'$'+v.toFixed(0)]];
  sumEl.innerHTML=mets.map(([l,v,f])=>'<div><div class="sr-stat-lbl">'+l+'</div><div class="sr-stat-val">'+(v===null?'—':f(v))+'</div></div>').join('');
}

async function srSave(submit){
  const today=todayStr();
  if(submit){srData.submitted=true;srData.submitted_at=new Date().toISOString();}
  const payload={date:today,venue:VENUE,data:srData};
  try{
    if(!srId){const chk=await sGet('/rest/v1/h_shift_reports?date=eq.'+today+'&venue=eq.'+VENUE+'&select=id&limit=1');if(Array.isArray(chk)&&chk[0])srId=chk[0].id;}
    if(srId){await sPatch('/rest/v1/h_shift_reports?id=eq.'+srId,payload);}
    else{const rows=await sPost('/rest/v1/h_shift_reports',payload);if(Array.isArray(rows)&&rows[0])srId=rows[0].id;}
    const lbl=document.getElementById('sr-save-lbl');
    if(lbl){lbl.textContent='Saved ✓';setTimeout(()=>{if(lbl)lbl.textContent='';},2000);}
  }catch(e){console.warn('SR save failed',e);}
}

async function srSubmit(){
  if(!srGet('manager_name')){toast('Please enter manager name first');return;}
  srSubmitted=true;
  await srSave(true);
  buildSR();
  toast('Report submitted ✅');
  try{await srEmail();}catch(e){console.warn('Email failed',e);}
}

let clData={},clId=null,clSigned=false,clTimer=null;

async function renderCL(){
  const today=todayStr();
  const lbl=document.getElementById('cl-date-lbl');
  if(lbl)lbl.textContent=fmtDate(today);
  try{
    const rows=await sGet('/rest/v1/rally_checklist?date=eq.'+today+'&shift=eq.h_manager_closing&limit=1');
    if(Array.isArray(rows)&&rows[0]){clId=rows[0].id;clData=rows[0].items||{};clSigned=!!rows[0].signed_off_at;}
    else{clId=null;clData={};clSigned=false;}
  }catch(e){clId=null;clData={};clSigned=false;}
  buildCL();
}

function buildCL(){
  const done=CL_ITEMS.filter(it=>{const s=clData[it.id]||{};return s.rating==='good'||s.done;}).length;
  const pct=Math.round((done/CL_ITEMS.length)*100);
  const fill=document.getElementById('cl-prog-fill');
  if(fill)fill.style.width=pct+'%';
  const btn=document.getElementById('cl-signoff-btn');
  if(btn){if(clSigned){btn.textContent='✅ Signed Off';btn.disabled=true;btn.style.opacity='.5';}else{btn.textContent='Sign Off';btn.disabled=false;btn.style.opacity='1';}}
  const body=document.getElementById('cl-body');
  body.innerHTML='<div style="background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;">'
    +'<div style="padding:11px 18px;background:var(--navy);display:flex;justify-content:space-between;align-items:center;">'
    +'<span style="font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:rgba(239,232,223,.75);">Closing Checklist</span>'
    +'<span style="font-size:12px;color:rgba(239,232,223,.45);">'+done+' / '+CL_ITEMS.length+'</span>'
    +'</div>'
    +'<div style="padding:4px 18px;">'
    +CL_ITEMS.map(it=>{
      const s=clData[it.id]||{};
      const isDone=s.done||s.rating==='good';
      const isNeeds=s.rating==='needs';
      const isPoor=s.rating==='poor';
      let h='<div class="cl-item">';
      h+='<div class="cl-chk '+(isDone?'good':isNeeds?'needs':isPoor?'poor':'')+'" onclick="clToggle(\''+it.id+'\')"></div>';
      h+='<div style="flex:1;"><div class="cl-txt '+(isDone?'done':'')+'" onclick="clToggle(\''+it.id+'\')">'+it.text+'</div>';
      if(!clSigned){
        h+='<div class="cl-ratings">';
        h+='<button class="cl-rb '+(s.rating==='good'?'sg':'')+'" onclick="clRate(\''+it.id+'\',\'good\')">&#10003; Good</button>';
        h+='<button class="cl-rb '+(s.rating==='needs'?'sn':'')+'" onclick="clRate(\''+it.id+'\',\'needs\')">&#9888; Needs Work</button>';
        h+='<button class="cl-rb '+(s.rating==='poor'?'sp':'')+'" onclick="clRate(\''+it.id+'\',\'poor\')">&#10005; Poor</button>';
        h+='</div>';
        if(s.rating==='needs'||s.rating==='poor'){
          h+='<input class="cl-issue" placeholder="Describe the issue..." value="'+(s.issue||'').replace(/"/g,'&quot;')+'" oninput="clIssue(\''+it.id+'\',this.value)"/>';
          h+='<div class="cl-fix-row">';
          h+='<button class="cl-fb '+(s.fixed==='yes'?'sy':'')+'" onclick="clFixed(\''+it.id+'\',\'yes\')">Fixed &#10003;</button>';
          h+='<button class="cl-fb '+(s.fixed==='no'?'sno':'')+'" onclick="clFixed(\''+it.id+'\',\'no\')">Could not fix</button>';
          h+='</div>';
          if(s.fixed)h+='<input class="cl-issue" style="margin-top:5px;" placeholder="Fix notes..." value="'+(s.fixNote||'').replace(/"/g,'&quot;')+'" oninput="clFixNote(\''+it.id+'\',this.value)"/>';
        }
      }else if(s.rating){
        h+='<div style="margin-top:3px;font-size:11px;font-weight:600;color:'+(s.rating==='good'?'#4e622c':s.rating==='needs'?'#c87a00':'#c0392b')+'">'+(s.rating==='good'?'&#10003; Good':s.rating==='needs'?'&#9888; Needs Work':'&#10005; Poor')+'</div>';
        if(s.issue)h+='<div style="font-size:12px;color:rgba(25,34,46,.55);font-style:italic;">"'+s.issue+'"</div>';
      }
      h+='</div></div>';
      return h;
    }).join('')
    +'</div></div>';
}

function clToggle(id){if(clSigned)return;if(!clData[id])clData[id]={};clData[id].done=!clData[id].done;if(clData[id].done&&!clData[id].rating)clData[id].rating='good';clDB();buildCL();}
function clRate(id,r){if(clSigned)return;if(!clData[id])clData[id]={};clData[id].rating=clData[id].rating===r?null:r;clData[id].done=clData[id].rating==='good';clDB();buildCL();}
function clIssue(id,v){if(!clData[id])clData[id]={};clData[id].issue=v;clDB();}
function clFixed(id,v){if(!clData[id])clData[id]={};clData[id].fixed=v;clDB();buildCL();}
function clFixNote(id,v){if(!clData[id])clData[id]={};clData[id].fixNote=v;clDB();}
function clDB(){clearTimeout(clTimer);clTimer=setTimeout(clSave,600);}

async function clSave(){
  const today=todayStr();
  const payload={date:today,shift:'h_manager_closing',manager_name:srGet('manager_name')||'Manager',items:clData,venue:VENUE};
  try{
    if(!clId){const chk=await sGet('/rest/v1/rally_checklist?date=eq.'+today+'&shift=eq.h_manager_closing&select=id&limit=1');if(Array.isArray(chk)&&chk[0])clId=chk[0].id;}
    if(clId){await sPatch('/rest/v1/rally_checklist?id=eq.'+clId,payload);}
    else{const rows=await sPost('/rest/v1/rally_checklist',payload);if(Array.isArray(rows)&&rows[0])clId=rows[0].id;}
    const lbl=document.getElementById('cl-save-lbl');
    if(lbl){lbl.textContent='Saved ✓';setTimeout(()=>{if(lbl)lbl.textContent='';},2000);}
  }catch(e){console.warn('CL save failed',e);}
}

async function signOffChecklist(){
  if(!confirm('Sign off and lock tonight\'s closing checklist?'))return;
  clSigned=true;
  try{
    if(!clId)await clSave();
    await sPatch('/rest/v1/rally_checklist?id=eq.'+clId,{signed_off_at:new Date().toISOString(),manager_name:srGet('manager_name')||'Manager'});
    toast('Checklist signed off ✅');buildCL();
    try{await clEmail();}catch(e){console.warn('Checklist email failed',e);}
  }catch(e){console.warn('Sign off failed',e);}
}

async function clEmail(){
  const today=todayStr();
  const dayLabel=fmtDate(today);
  const mgr=srGet('manager_name')||'Manager';
  const done=CL_ITEMS.filter(it=>{const s=clData[it.id]||{};return s.rating==='good'||s.done;}).length;

// PAST REPORTS
async function pastCheck(date){
  const status=document.getElementById('past-status');
  if(!status||!date)return;
  status.textContent='Checking...';
  try{
    const rows=await sGet('/rest/v1/h_shift_reports?date=eq.'+date+'&venue=eq.'+VENUE+'&select=id,date,data&limit=1');
    if(Array.isArray(rows)&&rows[0]){
      const d=rows[0].data||{};
      const food=parseFloat(d.food_sales||0),bev=parseFloat(d.bev_sales||0),total=food+bev;
      status.innerHTML='<span style="color:#4e622c;font-weight:600;">Report found</span>'
        +(d.submitted?' &nbsp;·&nbsp; ✅ Submitted':' &nbsp;·&nbsp; Draft')
        +(d.manager_name?' &nbsp;·&nbsp; '+d.manager_name:'')
        +(total?' &nbsp;·&nbsp; <strong>$'+total.toFixed(0)+'</strong>':'');
    }else{status.innerHTML='<span style="color:rgba(25,34,46,.4);">No report for this date.</span>';}
  }catch(e){status.innerHTML='<span style="color:rgba(192,57,43,.5);">Could not check.</span>';}
}

// RESEND EMAIL FOR A PAST REPORT
async function pastResendEmail() {
  const snap = window._pastReportSnap;
  if (!snap) { toast('No report loaded'); return; }
  const btn = document.getElementById('past-resend-btn');
  if (btn) { btn.textContent = '⏳ Sending...'; btn.disabled = true; }
  try {
    // Temporarily swap srData so srEmail() uses the past report's data
    const prevData = srData;
    srData = snap.data;
    // Patch srEmail to use the past date label
    const prevFmt = window._pastFmtOverride;
    window._pastFmtOverride = snap.date;
    await srEmailForDate(snap.date);
    window._pastFmtOverride = prevFmt;
    srData = prevData;
    if (btn) { btn.textContent = '✅ Sent!'; setTimeout(() => { if(btn){ btn.textContent = '📧 Resend Email'; btn.disabled = false; } }, 3000); }
    toast('Report emailed ✅');
  } catch(e) {
    console.warn('Resend failed', e);
    if (btn) { btn.textContent = '❌ Failed'; setTimeout(() => { if(btn){ btn.textContent = '📧 Resend Email'; btn.disabled = false; } }, 3000); }
    toast('Email failed — check console');
  }
}
